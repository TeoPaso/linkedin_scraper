name: Daily LinkedIn Job Scraper

on:
  # Trigger tramite Webhook esterno (es. cron-job.org) per esecuzione all'orario spaccato
  repository_dispatch:
    types: [trigger-daily-scrape]
  
  # Permette di lanciare il workflow manualmente dall'interfaccia di GitHub se necessario
  workflow_dispatch:

jobs:
  scrape_and_email:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper (main.py)
        continue-on-error: true
        env:
          # Queste variabili verranno prese dai GitHub Secrets, non dal file .env
          APIFY_API_TOKEN_1: ${{ secrets.APIFY_API_TOKEN_1 }}
          APIFY_API_TOKEN_2: ${{ secrets.APIFY_API_TOKEN_2 }}
          APIFY_API_TOKEN_3: ${{ secrets.APIFY_API_TOKEN_3 }}
          APIFY_API_TOKEN_4: ${{ secrets.APIFY_API_TOKEN_4 }}
          APIFY_API_TOKEN_5: ${{ secrets.APIFY_API_TOKEN_5 }}
          APIFY_API_TOKEN_6: ${{ secrets.APIFY_API_TOKEN_6 }}
          APIFY_API_TOKEN_7: ${{ secrets.APIFY_API_TOKEN_7 }}
          # Fallback
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          USE_VERTEX_AI: ${{ secrets.USE_VERTEX_AI }}
          VERTEX_LOCATION: ${{ secrets.VERTEX_LOCATION }}
        run: python main.py


      
      # I dati di stato (json) non vengono più committati nel repo.
      # Tutto viene salvato su Firestore.
      # La dashboard è ospitata staticamente tramite GitHub Pages (folder /docs).
