name: Daily LinkedIn Job Scraper

on:
  schedule:
    # 08:00 UTC corrisponde alle 10:00 CEST (ora italiana estiva) / 09:00 CET (invernale)
    - cron: '0 8 * * *'
  # Permette di lanciare il workflow manualmente dall'interfaccia di GitHub se necessario
  workflow_dispatch:

jobs:
  scrape_and_email:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run Scraper (main.py)
        continue-on-error: true
        env:
          # Queste variabili verranno prese dai GitHub Secrets, non dal file .env
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python main.py

      - name: Run Startup Outreach
        if: always()
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: python startup_outreach.py

      
      # I dati di stato (json) non vengono più committati nel repo.
      # Tutto viene salvato su Firestore.
      # La dashboard è ospitata staticamente tramite GitHub Pages (folder /docs).
