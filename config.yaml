# config.yaml
# I parametri di ricerca vengono generati dinamicamente da Gemini in base al profilo.

# Preferenze per la generazione delle ricerche
preferences:
  location: "Milan, Lombardy, Italy" # Location fissa su Milano
  language: "Italian"

# Configurazione dello scraper
scraper:
  jobs_target: 150 # Limite di lavori scaricati per singola ricerca (es. per test)
  scrape_company: false
  max_retries: 25         # Limite di ricerche generate da Gemini (1 per il test)
  count_per_search: 15    # Numero di job estratti per singola ricerca
  time_filter: "r604800" # Filtro temporale LinkedIn. r2592000 = past month, r604800 = past week, r86400 = past 24h. Vuoto "" = anytime

# Configurazione LLM e filtraggio
evaluation:
  min_fit_score: 75

# Configurazione modulo Startup Outreach
outreach:
  run_discovery: false
  min_signals: 3
  sources:
    - "https://www.p101.it/portfolio"
    - "https://www.cdpventurecapital.it"
    - "https://www.primovp.com/portfolio"
    - "https://unitedventures.com/portfolio"
    - "https://indacovp.com/portfolio"
    - "https://www.polihub.it"
    - "https://www.b4i.it"
    - "https://www.h-farm.com"

# Configurazione email
email:
  send_email: true
