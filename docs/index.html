<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execution Dashboard</title>
    <!-- Flatpickr per calendario multi-selezione -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-card: #1c1c1c;
            --bg-hover: #2a2a2a;
            --text-light: #e0e0e0;
            --text-muted: #888888;
            --accent: #00ffcc;
            /* Electric Green / Cyan */
            --accent-hover: #00e6b8;
            --border: #333333;

            --score-good: #00ffcc;
            --score-ok: #ffaa00;
            --score-bad: #ff4444;
            --score-none: #777777;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 30px;
            line-height: 1.6;
        }

        h1,
        h2,
        h3,
        h4 {
            color: var(--text-light);
            margin-top: 0;
            font-weight: 600;
        }

        .metric {
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent);
            font-size: 1.2em;
            font-weight: bold;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        /* --- Layout --- */
        .grid-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* --- Buttons --- */
        button {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent);
            color: var(--bg-main);
        }

        button:disabled {
            border-color: var(--text-muted);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* --- Ricerche --- */
        .search-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge.fruitful {
            background-color: var(--accent);
            color: var(--bg-main);
        }

        .badge.unfruitful {
            background-color: var(--score-none);
            color: var(--text-light);
        }

        /* --- Categorie --- */
        .categories-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        /* Scrollbar styles for horizontal scroll */
        .categories-container::-webkit-scrollbar {
            height: 8px;
        }

        .categories-container::-webkit-scrollbar-track {
            background: var(--bg-main);
            border-radius: 4px;
        }

        .categories-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .categories-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .category-item {
            cursor: pointer;
            transition: background 0.2s;
            min-width: 300px;
            max-width: 350px;
            flex-shrink: 0;
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
        }

        .category-item:hover {
            background-color: var(--bg-hover);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-body {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }

        .category-body.expanded {
            display: block;
        }

        .job-urls {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .job-urls li {
            margin-bottom: 6px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* --- Tutte le offerte (Table) --- */
        .table-responsive {
            overflow-x: auto;
        }

        .filters-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            align-content: start;
        }

        @media (max-width: 900px) {
            .filters-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        
        @media (max-width: 600px) {
            .filters-grid {
                grid-template-columns: 1fr;
            }
        }

        .flatpickr-alt-input {
            padding: 8px 60px 8px 10px;
            border-radius: 6px;
            background: #2c2c2c;
            color: #fff;
            border: 1px solid var(--border);
            width: 100%;
            box-sizing: border-box;
            height: 38px;
        }

        @keyframes pulse {
            0% {
                opacity: 0.7;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.7;
            }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            text-align: left;
        }

        th,
        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
        }

        tbody tr:hover {
            background-color: var(--bg-hover);
        }

        .score-green {
            color: var(--score-good);
            font-weight: bold;
        }

        .score-orange {
            color: var(--score-ok);
            font-weight: bold;
        }

        .score-red {
            color: var(--score-bad);
            font-weight: bold;
        }

        .score-grey {
            color: var(--score-none);
        }

        /* --- Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5em;
            padding: 0;
        }

        .modal-close:hover {
            color: var(--text-light);
            background: none;
        }

        .reasoning-box {
            background-color: rgba(255, 170, 0, 0.1);
            border-left: 3px solid var(--score-ok);
            padding: 10px 15px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .desc-box {
            font-family: inherit;
            font-size: 0.95em;
            white-space: pre-wrap;
            color: var(--text-light);
            line-height: 1.8;
        }

        /* --- Keyword Map --- */
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .bar-label {
            resize: horizontal;
            min-width: 150px;
            max-width: 600px;
            /* Per renderlo visibile aggiungo un bordino a destra */
            border-right: 2px solid var(--border);
            width: 250px;
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: ew-resize;
            padding-right: 10px;
        }

        .bar-track {
            flex-grow: 1;
            background-color: var(--border);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            background-color: var(--accent);
            height: 100%;
            transition: width 0.5s ease;
        }

        .bar-value {
            min-width: 90px;
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            color: var(--accent);
        }

        /* --- Toast --- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000;
        }

        .toast.active {
            transform: translateY(0);
            opacity: 1;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 15px 20px;
            background: rgba(44, 44, 44, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
        }

        .nav-link:hover {
            color: var(--text-light);
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .nav-link.active {
            color: var(--accent);
            background: rgba(0, 255, 204, 0.1);
            box-shadow: inset 0 0 0 1px rgba(0, 255, 204, 0.2);
        }

        /* --- Settings Form --- */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9em;
        }

        /* --- Modern Scrollbar Styling --- */
        .scroll-area-container {
            height: calc(100vh - 250px);
            /* Più spazio verticale */
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .scroll-area-container::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-area-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .scroll-area-container::-webkit-scrollbar-thumb {
            background-color: var(--border);
            border-radius: 10px;
        }

        .scroll-area-container::-webkit-scrollbar-thumb:hover {
            background-color: var(--accent);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-list .category-item {
            width: 100% !important;
            max-width: 100% !important;
            min-width: unset !important;
            margin: 0 !important;
            flex-direction: row !important;
        }

        input[type="number"],
        textarea,
        select {
            width: 100%;
            background: #2c2c2c;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 10px;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }

        /* --- Keywords Tags --- */
        .keyword-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .keyword-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .keyword-tag:hover {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.05);
        }

        .keyword-tag .remove {
            cursor: pointer;
            font-size: 1.1em;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .keyword-tag .remove:hover {
            color: #ff4444;
        }

        .keyword-add-row {
            display: flex;
            gap: 10px;
        }

        .hidden-auth {
            display: none !important;
        }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                font-size: 14px;
            }
            
            nav {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
                padding: 15px 10px;
            }
            
            .nav-links {
                flex-wrap: wrap;
                width: 100%;
                justify-content: flex-start;
                gap: 8px;
            }

            .nav-link {
                padding: 6px 12px;
                font-size: 0.9em;
            }
            
            .search-controls {
                flex-direction: column;
                align-items: stretch;
            }
            
            .search-grid, .settings-grid, .grid-header {
                grid-template-columns: 1fr;
            }
            
            .category-item {
                min-width: 260px;
                max-width: 280px;
            }
            
            .modal-container {
                width: 95%;
                margin: 0 auto;
                max-height: 90vh;
            }
            
            .modal-body {
                padding: 15px;
            }
            
            .bar-label {
                width: 120px;
                min-width: 100px;
                font-size: 0.8em;
                white-space: normal; /* Allow text to wrap instead of overflowing */
                word-wrap: break-word;
            }

            .bar-value {
                min-width: 60px;
                font-size: 0.8em;
            }
            
            th, td {
                padding: 8px 10px;
                font-size: 0.85em;
            }

            /* Fix long urls or words escaping containers */
            .desc-box, .reasoning-box, a, .metric {
                word-wrap: break-word;
                overflow-wrap: break-word;
                word-break: break-word;
            }
            
            .table-responsive {
                width: 100%;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }

            .card {
                padding: 15px;
            }
        }
    </style>

    <!-- Firebase JS SDK (v10 modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, setDoc, getDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

        // REPLACE WITH YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyBEFKDxMGMzT39UZvIpIjtNCpsL4pXyks4",
            authDomain: "beaming-figure-468411-h5.firebaseapp.com",
            projectId: "beaming-figure-468411-h5",
            storageBucket: "beaming-figure-468411-h5.firebasestorage.app",
            messagingSenderId: "704412197642",
            appId: "1:704412197642:web:33aa11acdd88ba898990f3",
            measurementId: "G-MMGH2LRG9B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Export to window to make it accessible to legacy scripts
        window.db = db;
        window.auth = auth;
        window.collection = collection;
        window.getDocs = getDocs;
        window.doc = doc;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.onSnapshot = onSnapshot;
        window.serverTimestamp = serverTimestamp;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signOut = signOut;

        // Aggiorna la navbar quando cambia lo stato auth
        onAuthStateChanged(auth, (user) => {
            const wasLoggedOut = !window.currentUser;
            window.currentUser = user;
            const authBtn = document.getElementById('auth-btn');
            if (authBtn) {
                authBtn.textContent = user ? '🔓 Logout' : '🔒 Login';
            }
            // Mostra/nascondi i controlli admin
            document.querySelectorAll('.admin-only').forEach(el => {
                if (user) {
                    el.classList.remove('hidden-auth');
                } else {
                    el.classList.add('hidden-auth');
                }
            });

            if (user) {
                if (wasLoggedOut && typeof loadDataFromFirestore === 'function') {
                    loadDataFromFirestore();
                } else if (typeof render === 'function') {
                    render();
                }
            } else {
                if (typeof render === 'function') {
                    render();
                }
                const modal = document.getElementById('login-modal');
                if (modal) modal.style.display = 'flex';
            }
        });
    </script>

</head>

<body>

    <!-- Login Modal -->
    <div id="login-modal"
        style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center;">
        <div
            style="background:#1c1c1c; border:1px solid #333; border-radius:8px; padding:40px; width:100%; max-width:380px;">
            <h3 style="color:#00ffcc; margin-top:0;">Login</h3>
            <div style="margin-bottom:15px;">
                <label style="display:block; color:#888; font-size:0.9em; margin-bottom:6px;">Email</label>
                <input type="email" id="login-email"
                    style="width:100%; background:#2c2c2c; border:1px solid #333; color:#fff; padding:10px; border-radius:6px; box-sizing:border-box;">
            </div>
            <div style="margin-bottom:20px;">
                <label style="display:block; color:#888; font-size:0.9em; margin-bottom:6px;">Password</label>
                <input type="password" id="login-password"
                    style="width:100%; background:#2c2c2c; border:1px solid #333; color:#fff; padding:10px; border-radius:6px; box-sizing:border-box;">
            </div>
            <div id="login-error" style="color:#ff4444; font-size:0.85em; margin-bottom:15px; display:none;"></div>
            <div style="display:flex; gap:10px;">
                <button onclick="doLogin()"
                    style="flex:1; background:#00ffcc; color:#0f0f0f; border:none; padding:10px; border-radius:6px; font-weight:bold; cursor:pointer;">Accedi</button>
                <button onclick="document.getElementById('login-modal').style.display='none'"
                    style="background:transparent; color:#888; border:1px solid #333; padding:10px 15px; border-radius:6px; cursor:pointer;">Annulla</button>
            </div>
        </div>
    </div>

    <div id="app"></div>

    <script>
        // ==========================================
        // DATA PLACEHOLDER
        // ==========================================
        let appData = {};

        // ==========================================
        // MOCK DATA FOR LOCAL TESTING
        // ==========================================


        // ==========================================
        // STATE
        // ==========================================

        let currentView = 'jobs';
        let searchSortOrder = 'chronological';
        let keywordLabelWidth = "";
        let botStatus = 'idle';
        let currentQuery = '';
        let keywordFilterMode = 'top5'; // 'all', 'useful', 'top5'

        window.changeKeywordFilter = function (val) {
            keywordFilterMode = val;
            render();
        };;

        window.toggleSearchSort = function () {
            searchSortOrder = searchSortOrder === 'chronological' ? 'useful_percent' : 'chronological';
            render();
        };

        window.setView = function (view) {
            currentView = view;
            render();
        };

        window.doLogin = async function () {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorEl = document.getElementById('login-error');
            try {
                await window.signInWithEmailAndPassword(window.auth, email, password);
                document.getElementById('login-modal').style.display = 'none';
                render();
            } catch (e) {
                errorEl.textContent = 'Credenziali errate.';
                errorEl.style.display = 'block';
            }
        };

        window.toggleAuth = async function () {
            if (window.currentUser) {
                await window.signOut(window.auth);
                window.currentUser = null;
                render();
            } else {
                const modal = document.getElementById('login-modal');
                modal.style.display = 'flex';
            }
        };

        let renderTimeout = null;
        function debouncedRender() {
            if (renderTimeout) clearTimeout(renderTimeout);
            renderTimeout = setTimeout(() => {
                render();
            }, 50);
        }

        async function loadDataFromFirestore() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = '<div style="text-align:center; padding: 50px;"><h2 style="color: var(--accent);">Connessione al database in tempo reale...</h2></div>';

            try {
                // Inizializza appData se non esiste
                if (!appData) appData = { execution_id: "N/A", job_store: {}, search_memory: [], job_categories: [], config: {}, apify_usage: {}, uiState: { page: 1, limit: 10, sortCol: "date", sortDir: "desc", filters: { date: [], keyword: "", category: "", score: "", liked: "" } } };

                // 1. Ascolto in tempo reale dei Jobs (usiamo docChanges per efficienza)
                window.onSnapshot(window.collection(window.db, "jobs"), (snapshot) => {
                    let job_store = appData.job_store || {};
                    snapshot.docChanges().forEach((change) => {
                        if (change.type === "added" || change.type === "modified") {
                            const data = change.doc.data();
                            const key = data.url || change.doc.id;
                            data._doc_id = change.doc.id;
                            job_store[key] = data;
                        }
                        if (change.type === "removed") {
                            const data = change.doc.data();
                            const key = data.url || change.doc.id;
                            delete job_store[key];
                        }
                    });
                    appData.job_store = job_store;
                    debouncedRender();
                }, (error) => console.error("Jobs sync error:", error));

                // 2. Ascolto in tempo reale della Search Memory
                window.onSnapshot(window.collection(window.db, "search_memory"), (snapshot) => {
                    let memory = [];
                    snapshot.forEach(doc => memory.push(doc.data()));
                    memory.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));
                    appData.search_memory = memory;

                    if (memory.length > 0) {
                        appData.execution_id = memory[memory.length - 1].execution_id || "N/A";
                    }
                    debouncedRender();
                });

                // 3. Ascolto in tempo reale delle Categorie
                window.onSnapshot(window.collection(window.db, "job_categories"), (snapshot) => {
                    let cats = [];
                    snapshot.forEach(doc => cats.push(doc.data()));
                    appData.job_categories = cats;
                    debouncedRender();
                });

                // 4. Ascolto in tempo reale della Configurazione
                window.onSnapshot(window.doc(window.db, "app_state", "config"), (doc) => {
                    if (doc.exists()) {
                        appData.config = doc.data();
                        debouncedRender();
                    }
                });

                // 5. Ascolto in tempo reale del Trigger (Stato Scraper)
                window.onSnapshot(window.doc(window.db, "app_state", "trigger"), (doc) => {
                    if (doc.exists()) {
                        const data = doc.data();
                        botStatus = data.status || 'idle';
                        currentQuery = data.current_query || '';
                        debouncedRender();
                    }
                });

                // 6. Ascolto in tempo reale del Profilo candidato
                window.onSnapshot(window.doc(window.db, "app_state", "profile"), (doc) => {
                    if (doc.exists()) {
                        appData.profile = doc.data().content || '';
                    } else {
                        appData.profile = '';
                    }
                    // Non fare render qui per evitare di resettare il textarea mentre si edita
                });

                // 7. Ascolto in tempo reale dell'utilizzo Apify
                window.onSnapshot(window.doc(window.db, "app_state", "apify_usage"), (doc) => {
                    if (doc.exists()) {
                        appData.apify_usage = doc.data() || {};
                        if (currentView === 'settings') {
                            debouncedRender();
                        }
                    }
                });


            } catch (e) {
                console.error(e);
                appDiv.innerHTML = `<div style="text-align:center; padding: 50px; color: var(--score-bad);"><h2>Errore di connessione a Firestore</h2><p>${e.message}</p></div>`;
            }
        }

        window.resetToFactory = async function () {
            if (!window.currentUser) { window.toggleAuth(); return; }
            if (!confirm("Sei sicuro di voler resettare ai parametri di fabbrica (quelli del file config.yaml locale)?")) return;

            try {
                const factoryDoc = await window.getDoc(window.doc(window.db, "app_state", "factory_config"));
                if (factoryDoc.exists()) {
                    const factoryConfig = factoryDoc.data();
                    await window.setDoc(window.doc(window.db, "app_state", "config"), factoryConfig);
                    appData.config = factoryConfig;
                    render();
                    showToast("Parametri resettati con successo!");
                } else {
                    alert("Factory config non trovata nel database.");
                }
            } catch (e) {
                console.error(e);
                alert("Errore durante il reset: " + e.message);
            }
        };

        window.startNewSearch = async function () {
            if (!window.currentUser) { window.toggleAuth(); return; }
            if (botStatus === 'running' || botStatus === 'pending') {
                alert("Una ricerca è già in corso o in coda.");
                return;
            }

            if (!confirm("Avviare una nuova ricerca con i parametri cloud correnti?")) return;

            const githubPat = (appData.config && appData.config.github) ? appData.config.github.pat : '';
            if (!githubPat) {
                alert("Token GitHub (PAT) non configurato. Vai in Configurazione per impostarlo.");
                return;
            }

            try {
                // 1. Trigger GitHub Actions workflow via API
                const resp = await fetch('https://api.github.com/repos/TeoPaso/linkedin_scraper/actions/workflows/daily_scrape.yml/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${githubPat}`,
                        'Accept': 'application/vnd.github.v3+json'
                    },
                    body: JSON.stringify({ ref: 'main' })
                });

                if (!resp.ok) {
                    const errText = await resp.text();
                    throw new Error(`GitHub API ${resp.status}: ${errText}`);
                }

                // 2. Aggiorna stato su Firestore
                await window.setDoc(window.doc(window.db, "app_state", "trigger"), {
                    status: 'pending',
                    current_query: 'Workflow GitHub Actions avviato...',
                    timestamp: window.serverTimestamp()
                });
                botStatus = 'pending';
                currentQuery = 'Workflow GitHub Actions avviato...';
                render();
                showToast("Workflow GitHub Actions avviato con successo!");
            } catch (e) {
                console.error(e);
                alert("Errore nell'avvio della ricerca: " + e.message);
            }
        };

        window.stopSearch = async function () {

                    status: 'stopping',
                    stop: true,
                    timestamp: window.serverTimestamp()
                });
                botStatus = 'stopping';
                render();
                showToast("Segnale di stop inviato!");
            } catch (e) {
                console.error(e);
                alert("Errore nell'invio dello stop: " + e.message);
            }
        };

        function renderKeywordMap() {
            const jobs = Object.values(appData.job_store || {});

            if (!jobs.length && !searches.length) return '';

            // Group by keyword
            const keywordStats = {};
            jobs.forEach(j => {
                const kw = j.keyword || "Unknown";
                if (!keywordStats[kw]) {
                    keywordStats[kw] = { found: 0, useful: 0 };
                }
                if (j.fit_score !== null && j.fit_score >= 75) {
                    keywordStats[kw].useful += 1;
                }
            });

            searches.forEach(s => {
                const kw = s.keyword || "Unknown";
                if (!keywordStats[kw]) {
                    keywordStats[kw] = { found: 0, useful: 0 };
                }
                keywordStats[kw].found += (s.jobs_found_total || s.total_found || 0);
            });

            const statsList = Object.keys(keywordStats).map(kw => {
                const stat = keywordStats[kw];
                let kpi = 0;
                let display = "";
                if (stat.found > 20) {
                    const pct = (stat.useful / stat.found) * 100;
                    kpi = pct;
                    display = `${stat.useful}/${stat.found} (${Math.round(pct)}%)`;
                } else {
                    kpi = stat.useful;
                    display = `${stat.useful}/${stat.found}`;
                }
                return { keyword: kw, ...stat, kpi, display };
            });

            // Sort by KPI descending
            statsList.sort((a, b) => b.kpi - a.kpi);

            if (!statsList.length) return '';

            const maxKpi = Math.max(...statsList.map(s => s.kpi), 1);

            let filteredList = statsList;
            if (keywordFilterMode === 'useful') {
                filteredList = statsList.filter(s => s.useful > 0);

        function getScoreHtml(score) {
            if (score === null || score === undefined) return `<span class="score-grey" style="font-size: 0.9em;">-</span>`;
            if (score >= 90) return `🏆 <span class="score-green" style="font-weight: bold; font-size: 1.1em; color: #ffd700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);">${score}</span>`;
            if (score >= 80) return `⭐ <span class="score-green" style="font-weight: bold;">${score}</span>`;
            if (score >= 70) return `✓ <span class="score-orange" style="font-weight: bold; color: #ffaa00;">${score}</span>`;
            return `❌ <span class="score-red" style="color: #ff4444; font-weight: bold;">${score}</span>`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatDateOnly(isoString) {
            if (!isoString || isoString === 'N/A') return 'N/A';
            try {
                let formattedIso = isoString;
                if (!isoString.includes('Z') && !/[+-]\d{2}:?\d{2}$/.test(isoString)) {
                    formattedIso = isoString + 'Z';
                }
                const dt = new Date(formattedIso);
                if (!isNaN(dt)) {
                    return dt.toLocaleDateString('it-IT', {
                        timeZone: 'Europe/Rome',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit'
                    });
                }
            } catch (e) {
                console.warn("Invalid date:", isoString);
            }
            return isoString;
        }

        function formatDate(isoString) {
            if (!isoString || isoString === 'N/A') return 'N/A';
            try {
                // Se non c'è fuso orario, assumiamo UTC (GitHub Actions) e aggiungiamo 'Z'
                let formattedIso = isoString;
                if (!isoString.includes('Z') && !/[+-]\d{2}:?\d{2}$/.test(isoString)) {
                    formattedIso = isoString + 'Z';
                }
                const dt = new Date(formattedIso);
                if (!isNaN(dt)) {
                    return dt.toLocaleString('it-IT', {
                        timeZone: 'Europe/Rome',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                }
            } catch (e) { }
            return isoString;
        }

        function getLocalDateString(isoString) {
            if (!isoString || isoString === 'N/A') return '';
            try {
                let formattedIso = isoString;
                if (!isoString.includes('Z') && !/[+-]\d{2}:?\d{2}$/.test(isoString)) {
                    formattedIso = isoString + 'Z';
                }
                const dt = new Date(formattedIso);
                if (!isNaN(dt)) {
                    const parts = new Intl.DateTimeFormat('it-IT', {
                        timeZone: 'Europe/Rome',
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit'
                    }).formatToParts(dt);
                    const day = parts.find(p => p.type === 'day').value;
                    const month = parts.find(p => p.type === 'month').value;
                    const year = parts.find(p => p.type === 'year').value;
                    return `${year}-${month}-${day}`;
                }
            } catch (e) { }
            const parts = isoString.split('T');
            return parts.length > 0 ? parts[0] : '';
        }

        function renderJobStore() {
            const jobs = appData.job_store || {};
            const urls = Object.keys(jobs);

            if (!urls.length) return '<div class="card">Nessuna offerta salvata.</div>';

            const uniqueDates = new Set();
            const uniqueKeywords = new Set();
            const uniqueCategories = new Set();

            let jobList = [];

            urls.forEach(url => {
                const j = jobs[url];
                const dateStr = j.first_seen || j.date_seen || '';
                if (dateStr) uniqueDates.add(getLocalDateString(dateStr));
                if (j.keyword) uniqueKeywords.add(j.keyword);
                if (j.category) uniqueCategories.add(j.category);

                // Determine UI score type for filtering
                let scoreType = 'non-valutato';
                if (j.fit_score !== null && typeof j.fit_score !== 'undefined') {
                    if (j.fit_score >= 90) scoreType = 'golden';
                    else if (j.fit_score >= 80) scoreType = 'tiera';
                    else if (j.fit_score >= 70) scoreType = 'tierb';
                    else scoreType = 'scartato';
                }

                let likedType = '';
                if (j.liked === true) likedType = 'liked';
                if (j.liked === false) likedType = 'disliked';

                jobList.push({
                    url: url,
                    j: j,
                    dateStr: dateStr ? getLocalDateString(dateStr) : '',
                    keyword: j.keyword || '',
                    category: j.category || '',
                    scoreType: scoreType,
                    likedType: likedType,
                    rawDate: dateStr,
                    title: j.job_data ? j.job_data.title : j.title,
                    company: j.job_data ? j.job_data.companyName : j.company,
                    location: j.job_data ? j.job_data.location : j.location,
                    scoreVal: j.fit_score || -1,
                    compensation: j.compensation || '',
                    applications: j.job_data ? (j.job_data.applicantsCount || '') : '',
                    employees: j.job_data ? (j.job_data.companyEmployeesCount || '') : '',
                    seniority: j.job_data ? (j.job_data.seniorityLevel || '') : '',
                    website: j.job_data ? (j.job_data.companyWebsite || '') : ''
                });
            });

            if (!appData.uiState) appData.uiState = { page: 1, limit: 10, sortCol: 'date', sortDir: 'desc', filters: { date: [], keyword: '', category: '', scores: [], liked: '', company: '', title: '', applied: '' } };
            const state = appData.uiState;

            // --- FILTERING ---
            let filteredList = jobList.filter(item => {
                const dateFilter = state.filters.date || [];
                const activeDates = Array.isArray(dateFilter) ? dateFilter : [dateFilter];
                if (activeDates.length === 2) {
                    if (item.dateStr < activeDates[0] || item.dateStr > activeDates[1]) return false;
                } else if (activeDates.length === 1) {
                    if (item.dateStr !== activeDates[0]) return false;
                }
                if (state.filters.keyword && item.keyword !== state.filters.keyword) return false;
                if (state.filters.category && item.category !== state.filters.category) return false;
                if (state.filters.scores && state.filters.scores.length > 0) {
                    if (!state.filters.scores.includes(item.scoreType)) return false;
                }
                if (state.filters.liked && item.likedType !== state.filters.liked) return false;
                if (state.filters.company && (!item.company || !item.company.toLowerCase().includes(state.filters.company.toLowerCase()))) return false;
                if (state.filters.title && (!item.title || !item.title.toLowerCase().includes(state.filters.title.toLowerCase()))) return false;
                if (state.filters.applied && state.filters.applied !== '') {
                    if (state.filters.applied === 'applied' && item.j.applied !== true) return false;
                    if (state.filters.applied === 'not-applied' && item.j.applied === true) return false;
                }
                return true;
            });

            // --- SORTING ---
            filteredList.sort((a, b) => {
                let valA, valB;
                switch (state.sortCol) {
                    case 'title': valA = (a.title || '').toLowerCase(); valB = (b.title || '').toLowerCase(); break;
                    case 'company': valA = (a.company || '').toLowerCase(); valB = (b.company || '').toLowerCase(); break;
                    case 'location': valA = (a.location || '').toLowerCase(); valB = (b.location || '').toLowerCase(); break;
                    case 'score': valA = a.scoreVal; valB = b.scoreVal; break;
                    case 'seniority': valA = (a.seniority || '').toLowerCase(); valB = (b.seniority || '').toLowerCase(); break;
                    case 'compensation': valA = (a.compensation || '').toLowerCase(); valB = (b.compensation || '').toLowerCase(); break;
                    case 'applications': valA = parseInt(a.applications) || 0; valB = parseInt(b.applications) || 0; break;
                    case 'category': valA = (a.category || '').toLowerCase(); valB = (b.category || '').toLowerCase(); break;
                    case 'date': valA = a.rawDate; valB = b.rawDate; break;
                    case 'liked': valA = a.likedType; valB = b.likedType; break;
                    case 'applied': valA = a.j.applied ? 1 : 0; valB = b.j.applied ? 1 : 0; break;
                    default: valA = a.rawDate; valB = b.rawDate; break;
                }
                if (valA < valB) return state.sortDir === 'asc' ? -1 : 1;
                if (valA > valB) return state.sortDir === 'asc' ? 1 : -1;
                return 0;
            });

            // --- PAGINATION ---
            const totalItems = filteredList.length;
            const totalPages = Math.max(1, Math.ceil(totalItems / state.limit));
            if (state.page > totalPages) state.page = totalPages;

            const startIndex = (state.page - 1) * state.limit;
            const paginatedList = filteredList.slice(startIndex, startIndex + state.limit);

            const currentDates = state.filters.date || [];
            const activeDatesForSelect = Array.isArray(currentDates) ? currentDates : [currentDates];
            const dateOptions = Array.from(uniqueDates).sort().reverse().map(d => `<option value="${d}" ${activeDatesForSelect.includes(d) ? 'selected' : ''}>${d}</option>`).join('');
            const keywordOptions = Array.from(uniqueKeywords).sort().map(k => `<option value="${escapeHtml(k)}" ${state.filters.keyword === k ? 'selected' : ''}>${escapeHtml(k)}</option>`).join('');
            const categoryOptions = Array.from(uniqueCategories).sort().map(c => `<option value="${escapeHtml(c)}" ${state.filters.category === c ? 'selected' : ''}>${escapeHtml(c)}</option>`).join('');

            const rows = paginatedList.map(item => {
                const j = item.j;

                const descriptionText = j.highlighted_description || (j.job_data ? j.job_data.descriptionText : j.descriptionText);

                const descId = "desc_" + Math.random().toString(36).substr(2, 9);
                window[`modalData_${descId}`] = {
                    docId: j._doc_id || '',
                    desc: descriptionText || '',
                    reason: j.reasoning || j.fit_reasoning || '',
                    scoreReason: j.fit_score_reasoning || '',
                    location: escapeHtml(item.location || ''),
                    seniority: escapeHtml(item.seniority || ''),

                    </div>

                </td>
            </tr>
        `;
            }).join('');

            return `

        // ==========================================
        // EVENTS
        // ==========================================
        function attachEvents() {
            const updateFilters = () => {
                if (!appData.uiState) return;
                const fTitle = document.getElementById('filter-title');
                const fApplied = document.getElementById('filter-applied');
                const fCompany = document.getElementById('filter-company');
                const fLimit = document.getElementById('filter-limit');
                
                if (fCompany) appData.uiState.filters.company = fCompany.value;
                if (fTitle) appData.uiState.filters.title = fTitle.value;
                if (fApplied) appData.uiState.filters.applied = fApplied.value;

                if (fLimit) appData.uiState.limit = parseInt(fLimit.value) || 10;

                appData.uiState.page = 1;
                render();
            };

            ['filter-limit', 'filter-company', 'filter-title', 'filter-applied'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    el.addEventListener('change', updateFilters);
                    if (id === 'filter-company') {
                        el.addEventListener('keydown', (e) => {
                            if (e.key === 'Enter') updateFilters();
                        });
                    }
                }
            });

            document.querySelectorAll('.pref-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!appData.uiState) return;
                    appData.uiState.filters.liked = btn.getAttribute('data-pref');
                    appData.uiState.page = 1;
                    render();
                });
            });


            document.querySelectorAll('.score-quadrant').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!appData.uiState) return;
                    if (!appData.uiState.filters.scores) appData.uiState.filters.scores = [];
                    const s = btn.getAttribute('data-score');
                    if (appData.uiState.filters.scores.includes(s)) {
                        appData.uiState.filters.scores = appData.uiState.filters.scores.filter(x => x !== s);
                    } else {
                        appData.uiState.filters.scores.push(s);
                    }
                    appData.uiState.page = 1;
                    render();
                });
            });

            const fDateInput = document.getElementById('filter-date');
            let fpInstance = null;
            if (fDateInput) {
                fpInstance = flatpickr(fDateInput, {
                    mode: "range",
                    dateFormat: "Y-m-d",
                    altInput: true,
                    altFormat: "d M Y",
                    altInputClass: "flatpickr-alt-input",
                    defaultDate: appData.uiState.filters.date || [],
                    onChange: function(selectedDates, dateStr, instance) {
                        appData.uiState.filters.date = dateStr ? dateStr.split(' to ') : [];
                        appData.uiState.page = 1;
                        render();
                    }
                });
            }

            const btnToday = document.getElementById('btn-today-filter');
            if (btnToday) {
                btnToday.addEventListener('click', () => {
                    const today = new Date().toISOString().split('T')[0];
                    if (fpInstance) {
                        fpInstance.setDate([today, today]);
                    }
                    if (appData.uiState) {
                        appData.uiState.filters.date = [today, today];
                        appData.uiState.page = 1;
                        render();
                    }
                });
            }

            const btnClear = document.getElementById('btn-clear-filters');
            if (btnClear) {
                btnClear.addEventListener('click', () => {
                    if (!appData.uiState) return;
                    appData.uiState.filters = { date: [], keyword: '', category: '', scores: [], liked: '', company: '', title: '', applied: '' };
                    appData.uiState.page = 1;
                    render();
                });
            }

            document.querySelectorAll('.btn-page').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (btn.disabled) return;
                    const newPage = parseInt(btn.getAttribute('data-page'));
                    if (!isNaN(newPage) && appData.uiState) {
                        appData.uiState.page = newPage;
                        render();
                    }
                });
            });

            document.querySelectorAll('.sortable').forEach(th => {
                th.addEventListener('click', () => {
                    const col = th.getAttribute('data-sort');
                    if (!appData.uiState) return;

                    if (appData.uiState.sortCol === col) {
                        if (appData.uiState.sortDir === 'desc') {
                            appData.uiState.sortDir = 'asc';
                        } else if (appData.uiState.sortDir === 'asc') {
                            appData.uiState.sortCol = 'date';
                            appData.uiState.sortDir = 'desc';
                        } else {
                            appData.uiState.sortDir = 'desc';
                        }
                    } else {
                        appData.uiState.sortCol = col;
                        appData.uiState.sortDir = 'desc';
                    }
                    appData.uiState.page = 1;
                    render();
                });
            });

            const selectAllCheckbox = document.getElementById('selectAllJobs');
            if (selectAllCheckbox) {
                selectAllCheckbox.addEventListener('change', (e) => {
                    document.querySelectorAll('.job-checkbox').forEach(cb => {
                        cb.checked = e.target.checked;
                    });
                });
            }

            const btnEvalSelected = document.getElementById('btn-eval-selected');
            if (btnEvalSelected) {
                btnEvalSelected.addEventListener('click', async () => {
                    const checkedBoxes = document.querySelectorAll('.job-checkbox:checked');
                    if (checkedBoxes.length === 0) {
                        alert("Seleziona almeno una job da valutare.");
                        return;
                    }
                    
                    if (!confirm(`Vuoi richiedere la valutazione di ${checkedBoxes.length} job?`)) return;
                    
                    btnEvalSelected.disabled = true;
                    btnEvalSelected.textContent = '⏳ Inviando...';
                    
                    try {
                        const promises = Array.from(checkedBoxes).map(cb => {
                            const docId = cb.getAttribute('data-docid');
                            if (docId) {
                                return window.updateDoc(window.doc(window.db, "jobs", docId), {
                                    needs_evaluation: true
                                });
                            }
                        });
                        await Promise.all(promises);
                        showToast(`Richiesta valutazione per ${checkedBoxes.length} job inviata!`);
                    } catch (err) {
                        console.error("Errore valutazione multipla:", err);
                        alert("Errore nell'impostare la valutazione: " + err.message);
                    } finally {
                        btnEvalSelected.disabled = false;
                        btnEvalSelected.textContent = '🔄 Valuta Selezionati';
                        if (selectAllCheckbox) selectAllCheckbox.checked = false;
                        document.querySelectorAll('.job-checkbox').forEach(cb => cb.checked = false);
                    }
                });
            }

            const modalBtnLike = document.getElementById('modal-btn-like');
            const modalBtnDislike = document.getElementById('modal-btn-dislike');
            if (modalBtnLike && modalBtnDislike) {
                const handleLikeClick = async (btn, isLikeBtn) => {
                    const docId = btn.getAttribute('data-docid');
                    if (!docId) return;
                    const isCurrentlyActive = btn.getAttribute('data-current') === 'true';
                    let newLikedValue = isLikeBtn ? true : false;
                    if (isCurrentlyActive) newLikedValue = null;
                    try {
                        await window.updateDoc(window.doc(window.db, "jobs", docId), { liked: newLikedValue });
                        if (newLikedValue === true) {
                            modalBtnLike.setAttribute('data-current', 'true');
                            modalBtnLike.style.backgroundColor = '#2e7d32';
                            modalBtnLike.style.color = '#fff';
                            modalBtnDislike.setAttribute('data-current', 'false');
                            modalBtnDislike.style.backgroundColor = 'transparent';
                            modalBtnDislike.style.color = 'var(--text-muted)';
                        } else if (newLikedValue === false) {
                            modalBtnDislike.setAttribute('data-current', 'true');
                            modalBtnDislike.style.backgroundColor = '#c62828';
                            modalBtnDislike.style.color = '#fff';
                            modalBtnLike.setAttribute('data-current', 'false');
                            modalBtnLike.style.backgroundColor = 'transparent';
                            modalBtnLike.style.color = 'var(--text-muted)';
                        } else {
                            modalBtnLike.setAttribute('data-current', 'false');
                            modalBtnLike.style.backgroundColor = 'transparent';
                            modalBtnLike.style.color = 'var(--text-muted)';
                            modalBtnDislike.setAttribute('data-current', 'false');
                            modalBtnDislike.style.backgroundColor = 'transparent';
                            modalBtnDislike.style.color = 'var(--text-muted)';
                        }
                    } catch(err) {
                        alert("Errore aggiornamento: " + err.message);
                    }
                };
                modalBtnLike.addEventListener('click', () => handleLikeClick(modalBtnLike, true));
                modalBtnDislike.addEventListener('click', () => handleLikeClick(modalBtnDislike, false));
            }

            const modalBtnApplied = document.getElementById('modal-btn-applied');
            if (modalBtnApplied) {
                modalBtnApplied.addEventListener('click', async () => {
                    const docId = modalBtnApplied.getAttribute('data-docid');
                    if (!docId) return;
                    const isCurrentlyApplied = modalBtnApplied.getAttribute('data-applied') === 'true';
                    try {
                        await window.updateDoc(window.doc(window.db, "jobs", docId), { applied: !isCurrentlyApplied });
                        modalBtnApplied.setAttribute('data-applied', !isCurrentlyApplied ? 'true' : 'false');
                        modalBtnApplied.style.backgroundColor = !isCurrentlyApplied ? '#2e7d32' : '#555';
                        modalBtnApplied.textContent = !isCurrentlyApplied ? 'Applicato ✓' : 'Non applicato';
                    } catch(err) {
                        alert("Errore aggiornamento: " + err.message);
                    }
                });
            }

            // Modal logic
            const modal = document.getElementById('info-modal');
            const closeBtn = document.getElementById('btn-close-modal');

            // Score click logic
            document.querySelectorAll('.score-link').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.currentTarget.getAttribute('data-target');
                    const data = window[`modalData_${targetId}`];
                    const scoreReasonText = data.scoreReason || data.reason || 'Nessuna informazione disponibile.';

                    let normalizedText = scoreReasonText;
                    if (!normalizedText.includes('\n') && normalizedText.match(/(?:\s+|^)[\*•]\s+/)) {
                        normalizedText = normalizedText.replace(/(?:\s+)([\*•])\s+/g, '\n$1 ');
                    }
                    
                    const lines = normalizedText.split(/\n/).filter(s => s.trim().length > 0);
                    const listHtml = lines.map(s => {
                        const cleaned = s.replace(/^\s*[\*\-•]\s*/, '');
                        return `<li>${cleaned}</li>`;
                    }).join('');

                    const scoreList = document.getElementById('score-reasoning-list');
                    if (scoreList) scoreList.innerHTML = listHtml;
                    
                    const reasoningEl = document.getElementById('modal-reasoning');
                    if (reasoningEl) reasoningEl.innerHTML = data.reason ? data.reason.replace(/\n/g, '<br>') : 'N/A';

                    const scoreModal = document.getElementById('score-modal');
                    if (scoreModal) scoreModal.classList.add('active');
                });
            });

            const scoreModal = document.getElementById('score-modal');
            const closeScoreBtn = document.getElementById('btn-close-score-modal');
            if (closeScoreBtn && scoreModal) {
                closeScoreBtn.addEventListener('click', () => scoreModal.classList.remove('active'));
                scoreModal.addEventListener('click', (e) => {
                    if (e.target === scoreModal) scoreModal.classList.remove('active');
                });
            }

            document.querySelectorAll('.btn-desc').forEach(btn => {
                btn.addEventListener('click', function () {
                    const targetId = this.getAttribute('data-target');
                    const data = window[`modalData_${targetId}`] || {};
                    document.getElementById('modal-description').innerHTML = data.desc ? data.desc.replace(/\n/g, '<br>') : 'N/A';
                    document.getElementById('modal-meta-location').textContent = data.location || 'N/A';
                    document.getElementById('modal-meta-seniority').textContent = data.seniority || 'N/A';
                    document.getElementById('modal-meta-compensation').textContent = data.compensation || 'N/A';
                    document.getElementById('modal-meta-applications').textContent = data.applications || 'N/A';
                    document.getElementById('modal-meta-category').textContent = data.category || 'N/A';
                    
                    const btnLink = document.getElementById('modal-btn-link');
                    if (data.url) {
                        btnLink.href = data.url;
                        btnLink.style.display = 'inline-block';
                    } else {
                        btnLink.style.display = 'none';
                    }

                    const btnLike = document.getElementById('modal-btn-like');
                    const btnDislike = document.getElementById('modal-btn-dislike');
                    const btnApplied = document.getElementById('modal-btn-applied');
                    
                    if (btnLike && btnDislike && btnApplied) {
                        btnLike.setAttribute('data-docid', data.docId || '');
                        btnLike.setAttribute('data-current', data.liked === true ? 'true' : 'false');
                        btnLike.style.backgroundColor = data.liked === true ? '#2e7d32' : 'transparent';
                        btnLike.style.color = data.liked === true ? '#fff' : 'var(--text-muted)';
                        
                        btnDislike.setAttribute('data-docid', data.docId || '');
                        btnDislike.setAttribute('data-current', data.liked === false ? 'true' : 'false');
                        btnDislike.style.backgroundColor = data.liked === false ? '#c62828' : 'transparent';
                        btnDislike.style.color = data.liked === false ? '#fff' : 'var(--text-muted)';

                        btnApplied.setAttribute('data-docid', data.docId || '');
                        btnApplied.setAttribute('data-applied', data.applied === true ? 'true' : 'false');
                        btnApplied.style.backgroundColor = data.applied === true ? '#2e7d32' : '#555';
                        btnApplied.style.color = 'white';
                        btnApplied.textContent = data.applied === true ? 'Applicato ✓' : 'Non applicato';
                    }
                    document.getElementById('info-modal').classList.add('active');
                });
            });

            if (closeBtn && modal) {
                closeBtn.addEventListener('click', () => {
                    modal.classList.remove('active');
                });
            }

            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('active');
                    }
                });
            }
        }

        // ==========================================
        // BOOTSTRAP
        // ==========================================
        render();

    </script>
</body>

</html>
