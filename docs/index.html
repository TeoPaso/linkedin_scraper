<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Execution Dashboard</title>
    <style>
        :root {
            --bg-main: #0f0f0f;
            --bg-card: #1c1c1c;
            --bg-hover: #2a2a2a;
            --text-light: #e0e0e0;
            --text-muted: #888888;
            --accent: #00ffcc;
            /* Electric Green / Cyan */
            --accent-hover: #00e6b8;
            --border: #333333;

            --score-good: #00ffcc;
            --score-ok: #ffaa00;
            --score-bad: #ff4444;
            --score-none: #777777;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-light);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 30px;
            line-height: 1.6;
        }

        h1,
        h2,
        h3,
        h4 {
            color: var(--text-light);
            margin-top: 0;
            font-weight: 600;
        }

        .metric {
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent);
            font-size: 1.2em;
            font-weight: bold;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        /* --- Layout --- */
        .grid-header {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        /* --- Buttons --- */
        button {
            background-color: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9em;
            transition: all 0.2s ease;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent);
            color: var(--bg-main);
        }

        button:disabled {
            border-color: var(--text-muted);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* --- Ricerche --- */
        .search-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
        }

        .badge.fruitful {
            background-color: var(--accent);
            color: var(--bg-main);
        }

        .badge.unfruitful {
            background-color: var(--score-none);
            color: var(--text-light);
        }

        /* --- Categorie --- */
        .categories-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            scroll-behavior: smooth;
        }

        /* Scrollbar styles for horizontal scroll */
        .categories-container::-webkit-scrollbar {
            height: 8px;
        }

        .categories-container::-webkit-scrollbar-track {
            background: var(--bg-main);
            border-radius: 4px;
        }

        .categories-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .categories-container::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
        }

        .category-item {
            cursor: pointer;
            transition: background 0.2s;
            min-width: 300px;
            max-width: 350px;
            flex-shrink: 0;
            margin-bottom: 0;
            display: flex;
            flex-direction: column;
        }

        .category-item:hover {
            background-color: var(--bg-hover);
        }

        .category-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-body {
            display: none;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }

        .category-body.expanded {
            display: block;
        }

        .job-urls {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .job-urls li {
            margin-bottom: 6px;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        /* --- Tutte le offerte (Table) --- */
        .table-responsive {
            overflow-x: auto;
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; }
            100% { opacity: 0.7; }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            text-align: left;
        }

        th,
        td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            font-weight: 500;
            white-space: nowrap;
        }

        tbody tr:hover {
            background-color: var(--bg-hover);
        }

        .score-green {
            color: var(--score-good);
            font-weight: bold;
        }

        .score-orange {
            color: var(--score-ok);
            font-weight: bold;
        }

        .score-red {
            color: var(--score-bad);
            font-weight: bold;
        }

        .score-grey {
            color: var(--score-none);
        }

        /* --- Modal --- */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
            overflow-y: auto;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.5em;
            padding: 0;
        }

        .modal-close:hover {
            color: var(--text-light);
            background: none;
        }

        .reasoning-box {
            background-color: rgba(255, 170, 0, 0.1);
            border-left: 3px solid var(--score-ok);
            padding: 10px 15px;
            margin-bottom: 20px;
            font-style: italic;
        }

        .desc-box {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            color: var(--text-muted);
        }

        /* --- Keyword Map --- */
        .bar-row {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .bar-label {
            resize: horizontal;
            min-width: 150px;
            max-width: 600px;
            /* Per renderlo visibile aggiungo un bordino a destra */
            border-right: 2px solid var(--border);
            width: 250px;
            font-size: 0.9em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: ew-resize;
            padding-right: 10px;
        }

        .bar-track {
            flex-grow: 1;
            background-color: var(--border);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .bar-fill {
            background-color: var(--accent);
            height: 100%;
            transition: width 0.5s ease;
        }

        .bar-value {
            min-width: 90px;
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9em;
            color: var(--accent);
        }
        /* --- Toast --- */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--bg-card);
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 12px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 2000;
        }

        .toast.active {
            transform: translateY(0);
            opacity: 1;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .nav-link {
            color: var(--text-muted);
            font-weight: 500;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .nav-link:hover {
            color: var(--accent);
            background: rgba(0, 255, 204, 0.05);
        }

        .nav-link.active {
            color: var(--accent);
            background: rgba(0, 255, 204, 0.1);
        }

        /* --- Settings Form --- */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9em;
        }

        /* --- Modern Scrollbar Styling --- */
        .scroll-area-container {
            height: calc(100vh - 250px); /* Più spazio verticale */
            overflow-y: auto;
            padding-right: 10px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .scroll-area-container::-webkit-scrollbar {
            width: 6px;
        }

        .scroll-area-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .scroll-area-container::-webkit-scrollbar-thumb {
            background-color: var(--border);
            border-radius: 10px;
        }

        .scroll-area-container::-webkit-scrollbar-thumb:hover {
            background-color: var(--accent);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-list .category-item {
            width: 100% !important;
            max-width: 100% !important;
            min-width: unset !important;
            margin: 0 !important;
            flex-direction: row !important;
        }
        input[type="number"],
        textarea,
        select {
            width: 100%;
            background: #2c2c2c;
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 10px;
            border-radius: 6px;
            font-family: inherit;
            box-sizing: border-box;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 5px rgba(0, 255, 204, 0.3);
        }

        .toggle-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 22px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--accent);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }
        /* --- Keywords Tags --- */
        .keyword-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .keyword-tag {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 6px 12px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            transition: all 0.2s;
        }

        .keyword-tag:hover {
            border-color: #ff4444;
            background: rgba(255, 68, 68, 0.05);
        }

        .keyword-tag .remove {
            cursor: pointer;
            font-size: 1.1em;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .keyword-tag .remove:hover {
            color: #ff4444;
        }

        .keyword-add-row {
            display: flex;
            gap: 10px;
        }
    </style>

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, setDoc, getDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        // REPLACE WITH YOUR FIREBASE CONFIG

            authDomain: "beaming-figure-468411-h5.firebaseapp.com",
            projectId: "beaming-figure-468411-h5",
            storageBucket: "beaming-figure-468411-h5.firebasestorage.app",
            messagingSenderId: "704412197642",

        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Export to window to make it accessible to legacy scripts
        window.db = db;
        window.collection = collection;
        window.getDocs = getDocs;

</head>

<body>

    <div id="app"></div>

    <script>
        // ==========================================
        // DATA PLACEHOLDER
        // ==========================================
        let appData = {};

        // ==========================================
        // MOCK DATA FOR LOCAL TESTING
        // ==========================================


        // ==========================================
        // STATE
        // ==========================================

        let currentView = 'dashboard';
        let searchSortOrder = 'chronological';
        let keywordLabelWidth = "";
        let botStatus = 'idle';
        let currentQuery = '';
        let hideEmptyKeywords = true;

        window.toggleEmptyKeywords = function () {
            hideEmptyKeywords = !hideEmptyKeywords;
            render();
        };

        window.toggleSearchSort = function () {
            searchSortOrder = searchSortOrder === 'chronological' ? 'useful_percent' : 'chronological';
            render();
        };

        window.setView = function (view) {
            currentView = view;
            render();
        };

        async function loadDataFromFirestore() {
            const appDiv = document.getElementById('app');
            appDiv.innerHTML = '<div style="text-align:center; padding: 50px;"><h2 style="color: var(--accent);">Loading data from Firestore...</h2></div>';

            try {
                const jobsSnapshot = await window.getDocs(window.collection(window.db, "jobs"));
                const memorySnapshot = await window.getDocs(window.collection(window.db, "search_memory"));
                const catsSnapshot = await window.getDocs(window.collection(window.db, "job_categories"));

                let job_store = {};
                jobsSnapshot.forEach(doc => {
                    const data = doc.data();
                    // L'ID del documento è un hash, ma l'URL è salvato dentro.
                    // Se manca usiamo l'ID come chiave per non far fallire la dashboard.
                    const key = data.url || doc.id;
                    // Salviamo anche doc.id per poter fare updateDoc
                    data._doc_id = doc.id;
                    job_store[key] = data;
                });

                let search_memory = [];
                memorySnapshot.forEach(doc => {
                    search_memory.push(doc.data());
                });
                // Ordina memory per timestamp
                search_memory.sort((a, b) => (a.timestamp || '').localeCompare(b.timestamp || ''));

                let job_categories = [];
                catsSnapshot.forEach(doc => {
                    job_categories.push(doc.data());
                });

                // Load cloud config
                let config = {};
                try {
                    const configDoc = await window.getDoc(window.doc(window.db, "app_state", "config"));
                    if (configDoc.exists()) {
                        config = configDoc.data();
                    }
                } catch (ce) { console.error("Config error:", ce); }

                // Load trigger status
                try {
                    const triggerDoc = await window.getDoc(window.doc(window.db, "app_state", "trigger"));
                    if (triggerDoc.exists()) {
                        const data = triggerDoc.data();
                        botStatus = data.status || 'idle';
                        currentQuery = data.current_query || '';
                    }
                } catch (te) { console.error("Trigger error:", te); }

                // Trova l'execution_id più recente basato sulla memory
                let execution_id = "N/A";
                if (search_memory.length > 0) {
                    execution_id = search_memory[search_memory.length - 1].execution_id || "N/A";
                }

                appData = {
                    execution_id,
                    job_store,
                    search_memory,
                    job_categories,
                    config
                };

                render();
            } catch (e) {
                console.error(e);
                appDiv.innerHTML = `<div style="text-align:center; padding: 50px; color: var(--score-bad);"><h2>Errore di connessione a Firestore</h2><p>${e.message}</p></div>`;
            }
        }

        document.addEventListener("DOMContentLoaded", () => {
            // Wait slightly for module import to complete, or use interval to check window.db
            const checkDb = setInterval(() => {
                if (window.db) {
                    clearInterval(checkDb);
                    loadDataFromFirestore();
                }
            }, 100);
        });


        // ==========================================
        // RENDER FUNCTIONS
        // ==========================================
        function render() {
            const app = document.getElementById('app');
            app.innerHTML = `
                <nav>
                    <div class="nav-links">
                        <div class="nav-link ${currentView === 'dashboard' ? 'active' : ''}" onclick="setView('dashboard')">📊 Dashboard</div>
                        <div class="nav-link ${currentView === 'history' ? 'active' : ''}" onclick="setView('history')">📜 Cronologia</div>
                        <div class="nav-link ${currentView === 'settings' ? 'active' : ''}" onclick="setView('settings')">⚙️ Configurazione</div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 20px;">
                        <button onclick="loadDataFromFirestore()" style="background: transparent; color: var(--text-light); border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 6px; font-size: 0.9em;" onmouseover="this.style.borderColor=var(--accent); this.style.color=var(--accent)" onmouseout="this.style.borderColor='var(--border)'; this.style.color='var(--text-light)'">
                            🔄 REFRESH
                        </button>
                        <div style="display: flex; align-items: center; gap: 8px; font-size: 0.85em; color: var(--text-muted); background: rgba(0,0,0,0.2); padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);">
                            <div style="width: 8px; height: 8px; border-radius: 50%; background: ${botStatus === 'running' ? '#ffaa00' : (botStatus === 'pending' ? '#00ccff' : (botStatus === 'stopping' ? '#ff4444' : '#00ffcc'))}; box-shadow: 0 0 8px ${botStatus === 'running' ? '#ffaa00' : (botStatus === 'pending' ? '#00ccff' : (botStatus === 'stopping' ? '#ff4444' : '#00ffcc'))};"></div>
                            <span style="letter-spacing: 0.5px;">BOT: ${botStatus.toUpperCase()}</span>
                        </div>
                        ${(botStatus === 'running' || botStatus === 'pending') ? `
                            <button onclick="stopSearch()" style="background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 8px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px;" onmouseover="this.style.background='rgba(255,68,68,0.1)'" onmouseout="this.style.background='transparent'">
                                🛑 STOP RICERCA
                            </button>
                        ` : `
                            <button onclick="startNewSearch()" style="background: var(--accent); color: var(--bg-main); border: none; padding: 8px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: transform 0.2s; display: flex; align-items: center; gap: 8px;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                                🚀 AVVIA RICERCA
                            </button>
                        `}
                    </div>
                </nav>
                <div id="view-content">
                    ${currentView === 'dashboard' ? renderDashboard() : (currentView === 'history' ? renderHistoryView() : renderSettings())}
                </div>
                </div>
                <div id="toast" class="toast">Settings saved successfully!</div>
            `;
            if (currentView === 'dashboard') {
                attachEvents();
            } else {
                attachSettingsEvents();
            }
        }

        function renderDashboard() {
            return `
                ${renderHeader()}
                ${renderKeywordMap()}
                ${renderCategorie()}
                ${renderJobStore()}
                ${renderModal()}
            `;
        }

        function renderHistoryView() {
            return `
                <div class="card" style="border-left: 4px solid var(--accent); margin-bottom: 30px;">
                    <h2 style="color: var(--accent); margin-bottom: 10px;">Monitoraggio Ricerche</h2>
                    <p style="color: var(--text-muted); font-size: 0.9em;">
                        Visualizza l'andamento delle ricerche in tempo reale e lo storico delle sessioni passate.
                    </p>
                </div>
                
                ${botStatus === 'running' ? `
                    <div class="card" style="background: rgba(0,255,204,0.05); border: 1px solid var(--accent); margin-bottom: 30px; animation: fadeIn 0.5s;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h3 style="margin: 0; color: var(--accent);">📡 Ricerca in corso...</h3>
                                <div style="font-size: 1.5em; font-weight: bold; margin-top: 10px;">${currentQuery || 'Inizializzazione...'}</div>
                            </div>
                            <div class="metric" style="color: var(--accent);">RUNNING</div>
                        </div>
                    </div>
                ` : ''}

                ${renderRicerche()}
            `;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('active');
            setTimeout(() => {
                toast.classList.remove('active');
            }, 3000);
        }

        window.saveSettings = async function () {
            const btn = document.getElementById('btn-save-settings');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Saving...';

            const config = {
                preferences: {
                    location: document.getElementById('cfg-location').value,
                    language: document.getElementById('cfg-language').value
                },
                scraper: {
                    jobs_target: parseInt(document.getElementById('cfg-jobs-target').value),
                    count_per_search: parseInt(document.getElementById('cfg-count-per-search').value),
                    unique_keyword_threshold: parseInt(document.getElementById('cfg-unique-threshold').value),
                    time_filter: document.getElementById('cfg-time-filter').value,
                    core_time_filter: document.getElementById('cfg-core-time-filter').value,
                    scrape_company: document.getElementById('cfg-scrape-company').checked,
                    core_keywords: (appData.config && appData.config.scraper) ? (appData.config.scraper.core_keywords || []) : []
                },
                evaluation: {
                    min_fit_score: parseInt(document.getElementById('cfg-min-fit').value)
                },
                outreach: {
                    run_discovery: document.getElementById('cfg-run-discovery').checked,
                    min_signals: parseInt(document.getElementById('cfg-min-signals').value)
                },
                email: {
                    send_email: document.getElementById('cfg-send-email').checked
                }
            };

            try {
                await window.setDoc(window.doc(window.db, "app_state", "config"), config);
                appData.config = config;
                showToast("Configuration saved to Firestore!");
            } catch (e) {
                console.error(e);
                alert("Error saving settings: " + e.message);
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        };

        window.removeKeyword = function (index) {
            appData.config.scraper.core_keywords.splice(index, 1);
            render();
        };

        window.addKeyword = function () {
            const input = document.getElementById('new-keyword-input');
            const val = input.value.trim();
            if (val) {
                if (!appData.config.scraper.core_keywords) appData.config.scraper.core_keywords = [];
                appData.config.scraper.core_keywords.push(val);
                input.value = '';
                render();
            }
        };

        window.resetToFactory = async function () {
            if (!confirm("Sei sicuro di voler resettare ai parametri di fabbrica (quelli del file config.yaml locale)?")) return;

            try {
                const factoryDoc = await window.getDoc(window.doc(window.db, "app_state", "factory_config"));
                if (factoryDoc.exists()) {
                    const factoryConfig = factoryDoc.data();
                    await window.setDoc(window.doc(window.db, "app_state", "config"), factoryConfig);
                    appData.config = factoryConfig;
                    render();
                    showToast("Parametri resettati con successo!");
                } else {
                    alert("Factory config non trovata nel database.");
                }
            } catch (e) {
                console.error(e);
                alert("Errore durante il reset: " + e.message);
            }
        };

        window.startNewSearch = async function () {
            if (botStatus === 'running' || botStatus === 'pending') {
                alert("Una ricerca è già in corso o in coda.");
                return;
            }

            if (!confirm("Avviare una nuova ricerca con i parametri cloud correnti?")) return;

            try {
                await window.setDoc(window.doc(window.db, "app_state", "trigger"), {
                    status: 'pending',
                    current_query: 'Inizializzazione...',
                    timestamp: window.serverTimestamp()
                });
                botStatus = 'pending';
                currentQuery = 'Inizializzazione...';
                render();
                showToast("Segnale di avvio inviato al bot!");
            } catch (e) {
                console.error(e);
                alert("Errore nell'invio del trigger: " + e.message);
            }
        };

        window.stopSearch = async function () {
            if (!confirm("Sei sicuro di voler fermare la ricerca in corso?")) return;
            try {
                await window.setDoc(window.doc(window.db, "app_state", "trigger"), {
                    status: 'stopping',
                    stop: true,
                    timestamp: window.serverTimestamp()
                });
                botStatus = 'stopping';
                render();
                showToast("Segnale di stop inviato!");
            } catch (e) {
                console.error(e);
                alert("Errore nell'invio dello stop: " + e.message);
            }
        };

        // Aggiornamento automatico dello stato del bot ogni 3 secondi
        setInterval(async () => {
            if (!window.db) return;
            try {
                const triggerDoc = await window.getDoc(window.doc(window.db, "app_state", "trigger"));
                if (triggerDoc.exists()) {
                    const data = triggerDoc.data();
                    const newStatus = data.status || 'idle';
                    const newQuery = data.current_query || '';
                    if (newStatus !== botStatus || newQuery !== currentQuery) {
                        botStatus = newStatus;
                        currentQuery = newQuery;
                        render();
                    }
                }
            } catch (e) {}
        }, 3000);

        function renderSettings() {
            const cfg = appData.config || {};
            const pref = cfg.preferences || {};
            const scrap = cfg.scraper || {};
            const eval_ = cfg.evaluation || {};
            const out = cfg.outreach || {};
            const em = cfg.email || {};

            return `
                <div class="card" style="border-left: 4px solid var(--accent);">
                    <h2 style="color: var(--accent); margin-bottom: 10px;">Configurazione Scraper</h2>
                    <p style="color: var(--text-muted); font-size: 0.9em; margin-bottom: 25px;">

                    <div class="settings-grid">

                        <div class="settings-column">

                            <div class="card" style="background: rgba(0,0,0,0.2);">

                                    <label>Location (LinkedIn)</label>

                                    <label>Lingua</label>
                                    <input type="text" id="cfg-language" value="${pref.language || 'Italian'}">

                                <div class="search-grid" style="grid-template-columns: 1fr 1fr; gap: 15px;">
                                    <div class="form-group">
                                        <label>Lavori Target (Totali)</label>
                                        <input type="number" id="cfg-jobs-target" value="${scrap.jobs_target || 100}">
                                    </div>
                                    <div class="form-group">
                                        <label>Jobs per Query</label>
                                        <input type="number" id="cfg-count-per-search" value="${scrap.count_per_search || 20}">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Soglia Ciclaggio (Keywords uniche)</label>
                                    <input type="number" id="cfg-unique-threshold" value="${scrap.unique_keyword_threshold || 40}">
                                </div>
                                <div class="form-group">
                                    <div class="toggle-group">
                                        <span>Scrape Company Details</span>
                                        <label class="switch">
                                            <input type="checkbox" id="cfg-scrape-company" ${scrap.scrape_company ? 'checked' : ''}>
                                            <span class="slider"></span>
                                        </label>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Colonna 2: Filtri e AI -->
                        <div class="settings-column">
                            <h3>🤖 AI & Filtri</h3>
                            <div class="card" style="background: rgba(0,0,0,0.2);">
                                <div class="form-group">
                                    <label>Min Fit Score (0-100)</label>
                                    <input type="range" id="cfg-min-fit" min="0" max="100" value="${eval_.min_fit_score || 75}" style="width: 100%; accent-color: var(--accent);">
                                    <div style="text-align: right; color: var(--accent); font-weight: bold; margin-top: 5px;">
                                        <span id="cfg-min-fit-val">${eval_.min_fit_score || 75}</span>/100
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label>Time Filter (Generic)</label>
                                    <select id="cfg-time-filter">
                                        <option value="r86400" ${scrap.time_filter === 'r86400' ? 'selected' : ''}>Ultime 24h</option>
                                        <option value="r604800" ${scrap.time_filter === 'r604800' ? 'selected' : ''}>Ultima Settimana</option>
                                        <option value="r2592000" ${scrap.time_filter === 'r2592000' ? 'selected' : ''}>Ultimo Mese</option>
                                        <option value="" ${scrap.time_filter === '' ? 'selected' : ''}>Senza limite</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>Time Filter (Core Keywords)</label>
                                    <select id="cfg-core-time-filter">
                                        <option value="r86400" ${scrap.core_time_filter === 'r86400' ? 'selected' : ''}>Ultime 24h</option>
                                        <option value="r604800" ${scrap.core_time_filter === 'r604800' ? 'selected' : ''}>Ultima Settimana</option>
                                        <option value="r2592000" ${scrap.core_time_filter === 'r2592000' ? 'selected' : ''}>Ultimo Mese</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <div class="toggle-group">
                                        <span>Invia Report Email</span>
                                        <label class="switch">

                            </div>
                        </div>

                        <!-- Colonna 3: Core Keywords & Outreach -->
                        <div class="settings-column">
                            <h3>💎 Core Keywords</h3>
                            <div class="card" style="background: rgba(0,0,0,0.2);">
                                <div class="form-group">
                                    <label>Keywords fisse testate ad ogni esecuzione</label>
                                    
                                    <div class="keyword-list" style="margin-top: 10px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr; gap: 8px;">
                                        ${(scrap.core_keywords || []).map((k, i) => `
                                            <div class="keyword-tag" style="justify-content: space-between; background: #252525;">
                                                <span style="font-weight: 500;">${k}</span>
                                                <span class="remove" onclick="removeKeyword(${i})" title="Elimina keyword">🗑️</span>
                                            </div>
                                        `).join('')}
                                        ${!(scrap.core_keywords && scrap.core_keywords.length) ? '<div style="color: var(--text-muted); font-style: italic; font-size: 0.85em;">Nessuna keyword impostata.</div>' : ''}
                                    </div>

                                    <div class="keyword-add-row">
                                        <input type="text" id="new-keyword-input" placeholder="Aggiungi keyword..." onkeypress="if(event.key==='Enter') addKeyword()">
                                        <button onclick="addKeyword()" style="background: var(--accent); color: var(--bg-main); border: none; font-size: 1.2em; width: 45px;">+</button>
                                    </div>

                                <hr style="border-top: 1px dashed var(--border); margin: 25px 0;">
                                <h3>🚀 Outreach</h3>
                                <div class="form-group">

                    <div style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center;">
                        <button onclick="resetToFactory()" style="background: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 10px 20px;">
                            🔄 RESET AI VALORI LOCALI
                        </button>
                        <button id="btn-save-settings" onclick="saveSettings()" style="padding: 12px 40px; font-size: 1.1em; font-weight: bold; background: var(--accent); color: var(--bg-main);">

        }

        function attachSettingsEvents() {
            const range = document.getElementById('cfg-min-fit');
            const val = document.getElementById('cfg-min-fit-val');
            if (range && val) {
                range.addEventListener('input', (e) => {
                    val.textContent = e.target.value;
                });
            }
        }

        function renderHeader() {
            const exId = appData.execution_id || 'N/A';

            // Calculate total and useful jobs
            const totalFound = Object.keys(appData.job_store || {}).length;
            const totalUseful = Object.values(appData.job_store || {}).filter(j => j.fit_score !== null && j.fit_score >= 75).length;

            const todayPrefix = exId !== 'N/A' ? exId.split('T')[0] : '';

            // Calculate the avg fit score for this specific execution
            let avgFit = 0.0;
            if (appData.search_memory) {
                const execMem = appData.search_memory.filter(s => {
                    if (!todayPrefix) return s.execution_id === exId && typeof s.avg_fit_score === 'number';
                    return ((s.timestamp && s.timestamp.startsWith(todayPrefix)) || (s.execution_id && s.execution_id.startsWith(todayPrefix))) && typeof s.avg_fit_score === 'number';
                });
                if (execMem.length > 0) {
                    const sum = execMem.reduce((acc, curr) => acc + curr.avg_fit_score, 0);
                    avgFit = sum / execMem.length;
                }
            } else {
                avgFit = appData.metrics?.avg_fit_score || 0;
            }

            let displayExId = exId;
            try {
                if (exId !== 'N/A') {
                    const dt = new Date(exId);
                    if (!isNaN(dt)) {
                        displayExId = dt.toLocaleString();
                    }
                }
            } catch (e) { }

            return `
        <h2>Overview</h2>
        <div class="grid-header">
            <div class="card">
                <div style="color: var(--text-muted); margin-bottom: 5px;">Ultima run</div>
                <div class="metric" style="font-size: 1em;">${displayExId}</div>
            </div>
            <div class="card">
                <div style="color: var(--text-muted); margin-bottom: 5px;">Total Jobs (Useful/Found)</div>
                <div class="metric">${totalUseful} / ${totalFound}</div>
            </div>
            <div class="card">
                <div style="color: var(--text-muted); margin-bottom: 5px;">Avg Fit Score</div>
                <div class="metric">${typeof avgFit === 'number' ? avgFit.toFixed(1) : avgFit}</div>
            </div>
        </div>
    `;
        }

        function renderKeywordMap() {
            const jobs = Object.values(appData.job_store || {});
            const searches = appData.search_memory || [];
            if (!jobs.length && !searches.length) return '';

            // Group by keyword
            const keywordStats = {};
            jobs.forEach(j => {
                const kw = j.keyword || "Unknown";
                if (!keywordStats[kw]) {
                    keywordStats[kw] = { found: 0, useful: 0 };
                }
                if (j.fit_score !== null && j.fit_score >= 75) {
                    keywordStats[kw].useful += 1;
                }
            });

            searches.forEach(s => {
                const kw = s.keyword || "Unknown";
                if (!keywordStats[kw]) {
                    keywordStats[kw] = { found: 0, useful: 0 };
                }
                keywordStats[kw].found += (s.jobs_found_total || s.total_found || 0);
            });

            const statsList = Object.keys(keywordStats).map(kw => {
                const stat = keywordStats[kw];
                let kpi = 0;
                let display = "";
                if (stat.found > 20) {
                    const pct = (stat.useful / stat.found) * 100;
                    kpi = pct;
                    display = `${stat.useful}/${stat.found} (${Math.round(pct)}%)`;
                } else {
                    kpi = stat.useful;
                    display = `${stat.useful}/${stat.found}`;
                }
                return { keyword: kw, ...stat, kpi, display };
            });

            // Sort by KPI descending
            statsList.sort((a, b) => b.kpi - a.kpi);

            if (!statsList.length) return '';

            const maxKpi = Math.max(...statsList.map(s => s.kpi), 1);

            const filteredList = hideEmptyKeywords ? statsList.filter(s => s.useful > 0) : statsList;
            const hiddenCount = statsList.length - filteredList.length;

            const bars = filteredList.map(s => {
                const pct = maxKpi > 0 ? (s.kpi / maxKpi) * 100 : 0;
                return `
            <div class="bar-row">
                <div class="bar-label" title="${s.keyword}" style="${keywordLabelWidth ? `width: ${keywordLabelWidth};` : ''}">${s.keyword}</div>
                <div class="bar-track">
                    <div class="bar-fill" style="width: ${pct}%;"></div>
                </div>
                <div class="bar-value">${s.display}</div>
            </div>
        `;
            }).join('');

            return `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h2 style="margin: 0;">Migliori Keyword</h2>
            <button onclick="toggleEmptyKeywords()" style="font-size: 0.8em; padding: 5px 12px;">
                ${hideEmptyKeywords ? `Mostra tutte (${hiddenCount} nascoste)` : 'Nascondi 0 useful'}
            </button>
        </div>
        <div class="card">
            ${bars || '<div style="color: var(--text-muted); padding: 10px;">Nessuna keyword con risultati utili trovata.</div>'}
        </div>
    `;
        }

        function renderRicerche() {
            let searches = [...(appData.search_memory || [])];
            if (!searches.length) return `<div class="card">Nessuna ricerca trovata in memoria.</div>`;

            searches.forEach(s => {
                let usefulCount = 0;
                if (appData.job_store) {
                    Object.values(appData.job_store).forEach(j => {
                        if (j.execution_id === s.execution_id && j.keyword === s.keyword && j.fit_score !== null && j.fit_score >= 75) {
                            usefulCount++;
                        }
                    });
                }
                s._usefulCount = usefulCount;
                let foundCount = s.jobs_found_total || s.total_found || 0;
                s._usefulPct = foundCount > 0 ? (usefulCount / foundCount) * 100 : 0;
            });

            if (searchSortOrder === 'useful_percent') {
                searches.sort((a, b) => b._usefulPct - a._usefulPct);
            } else {
                searches.sort((a, b) => (b.timestamp || '').localeCompare(a.timestamp || ''));
            }

            const html = searches.map(s => getSearchCardHtml(s)).join('');

            return `
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px; margin-bottom: 15px;">
            <h2 style="margin: 0;">Cronologia Ricerche</h2>
            <button onclick="toggleSearchSort()" title="Cambia ordinamento" style="font-size: 0.85em; padding: 6px 12px;">
                Ordina per: ${searchSortOrder === 'chronological' ? 'Data' : '% Useful'}
            </button>
        </div>
        <div class="scroll-area-container">
            <div class="history-list">
                ${html}
            </div>
        </div>
    `;
        }

        function getSearchCardHtml(s) {
            if (!s) return '';
            const badgeClass = s.fruitful ? 'fruitful' : 'unfruitful';
            const badgeText = s.fruitful ? 'Fruitful' : 'Unfruitful';
            const avgFitValue = typeof s.avg_fit_score === 'number' ? s.avg_fit_score : (typeof s.avg_fit === 'number' ? s.avg_fit : null);
            const avgFit = avgFitValue !== null ? avgFitValue.toFixed(1) : '<span style="color: var(--text-muted);">N/A</span>';

            // Convert ISO datetime to something more readable
            let displayTs = s.timestamp;
            try {
                if (displayTs) {
                    const dt = new Date(displayTs);
                    if (!isNaN(dt)) {
                        displayTs = dt.toLocaleString();
                    }
                }
            } catch (e) { }

            let usefulCount = s._usefulCount !== undefined ? s._usefulCount : 0;
            let foundCount = s.jobs_found_total || s.total_found || 0;
            
            let usefulDisplay = `${usefulCount}`;
            if (foundCount > 0) {
                let pct = Math.round((usefulCount / foundCount) * 100);
                usefulDisplay += `<span style="font-size: 0.75em; color: var(--text-muted);">(${pct}%)</span>`;
            }

            return `
        <div class="card category-item" style="padding: 15px 25px; margin-bottom: 12px; border-left: 4px solid ${s.fruitful ? 'var(--score-good)' : 'var(--border)'}; display: flex; align-items: center; gap: 30px; min-height: 80px;">
            
            <!-- Sezione 1: Keyword e Badge (Larghezza fissa ma generosa) -->
            <div style="flex: 0 0 320px;">
                <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 5px;">
                    <h3 style="margin: 0; font-size: 1.15em; color: var(--text-light); line-height: 1.2;">${s.keyword}</h3>
                </div>
                <span class="badge ${badgeClass}" style="font-size: 0.65em; padding: 2px 8px;">${badgeText}</span>
                <div style="color: var(--text-muted); font-size: 0.8em; font-family: monospace; margin-top: 8px; opacity: 0.7;">
                    ${displayTs}
                </div>
            </div>

            <!-- Sezione 2: Metriche (Compatte e verticali) -->
            <div style="display: flex; gap: 35px; align-items: center; flex-shrink: 0; border-left: 1px solid var(--border); padding-left: 30px; padding-right: 30px;">
                <div style="text-align: center; min-width: 60px;">
                    <div style="color: var(--text-muted); font-size: 0.65em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Found</div>
                    <div class="metric" style="font-size: 1.2em;">${foundCount}</div>
                </div>
                <div style="text-align: center; min-width: 70px;">
                    <div style="color: var(--text-muted); font-size: 0.65em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Useful</div>
                    <div class="metric" style="font-size: 1.2em; color: var(--accent);">${usefulDisplay}</div>
                </div>
                <div style="text-align: center; min-width: 60px;">
                    <div style="color: var(--text-muted); font-size: 0.65em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;">Avg Fit</div>
                    <div class="metric" style="font-size: 1.2em;">${avgFit}</div>
                </div>
            </div>

            <!-- Sezione 3: Top Job Titles (SI ESPANDE PER USARE TUTTO LO SPAZIO) -->
            <div style="flex-grow: 1; border-left: 1px solid var(--border); padding-left: 30px; overflow: hidden;">
                <div style="color: var(--text-muted); font-size: 0.7em; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.6;">Top Job Titles</div>
                <div style="font-size: 0.9em; line-height: 1.5; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;" title="${(s.top_titles || []).join(', ')}">
                    ${(s.top_titles || []).join(', ')}
                </div>
            </div>

        </div>
    `;
        }

        function renderCategorie() {
            const cats = appData.job_categories || [];
            if (!cats.length) return '';

            // Pre-calcola le stats per ogni categoria e ordina per useful decrescente
            const catsWithStats = cats.map((c, idx) => {
                const urls = c.job_urls || [];
                let useful = 0;
                urls.forEach(u => {
                    const j = appData.job_store ? appData.job_store[u] : null;
                    if (j && j.fit_score !== null && j.fit_score >= 75) useful++;
                });
                return { cat: c, idx, urls, useful, found: urls.length };
            });

            catsWithStats.sort((a, b) => b.useful - a.useful || b.found - a.found);

            const html = catsWithStats.map(({ cat: c, idx, urls, useful, found }) => {
                let displayStr = `${useful}/${found}`;
                if (found > 20) {
                    const pct = Math.round((useful / found) * 100);
                    displayStr = `${useful}/${found} (${pct}%)`;
                }

                return `
            <div class="card category-item" data-index="${idx}">
                <div class="category-header">
                    <div>
                        <h4 style="margin: 0; color: var(--accent);">${c.label}</h4>
                        <div style="font-size: 0.9em; color: var(--text-muted); margin-top: 5px;">${c.description}</div>
                    </div>
                    <div class="metric" style="align-self: flex-start; margin-left: 15px;">${displayStr}</div>
                </div>
                <div class="category-body" id="cat-body-${idx}" style="flex-grow: 1; overflow-y: auto; max-height: 250px;">
                    <ul class="job-urls">
                        ${urls.map(u => { const j = appData.job_store[u]; const t = j?.job_data?.title || u; const isUseful = j?.fit_score !== null && j?.fit_score !== undefined && j?.fit_score >= 75; const color = isUseful ? 'var(--score-good)' : '#aaaaaa'; return `<li><a href="${u}" target="_blank" style="color: ${color};">${t}</a></li>`; }).join('')}
                    </ul>
                </div>
            </div>
        `;
            }).join('');

            return `
        <h2>Categorie (create da Gemini)</h2>
        <div class="categories-container">
            ${html}
        </div>
    `;
        }

        function getScoreHtml(score) {
            if (score === null || score === undefined) return `<span class="score-grey">-</span>`;
            if (score >= 85) return `<span class="score-green">${score}</span>`;
            if (score >= 75) return `<span class="score-orange">${score}</span>`;
            return `<span class="score-red">${score}</span>`;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function formatDate(isoString) {
            if (!isoString || isoString === 'N/A') return 'N/A';
            try {
                const dt = new Date(isoString);
                if (!isNaN(dt)) {
                    return dt.toLocaleString('it-IT', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                }
            } catch (e) { }
            return isoString;
        }

        function renderJobStore() {
            const jobs = appData.job_store || {};
            const urls = Object.keys(jobs);

            if (!urls.length) return '<div class="card">Nessuna offerta salvata.</div>';

            const uniqueDates = new Set();
            const uniqueKeywords = new Set();
            const uniqueCategories = new Set();

            urls.forEach(url => {
                const j = jobs[url];
                const dateStr = j.first_seen || j.date_seen || '';
                if (dateStr) uniqueDates.add(dateStr.split('T')[0]);
                if (j.keyword) uniqueKeywords.add(j.keyword);
                if (j.category) uniqueCategories.add(j.category);
            });

            const dateOptions = Array.from(uniqueDates).sort().reverse().map(d => `<option value="${d}">${d}</option>`).join('');
            const keywordOptions = Array.from(uniqueKeywords).sort().map(k => `<option value="${escapeHtml(k)}">${escapeHtml(k)}</option>`).join('');
            const categoryOptions = Array.from(uniqueCategories).sort().map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');

            const rows = urls.map(url => {
                const j = jobs[url];
                const scoreHtml = getScoreHtml(j.fit_score);
                const title = j.job_data ? j.job_data.title : j.title;
                const company = j.job_data ? j.job_data.companyName : j.company;
                const location = j.job_data ? j.job_data.location : j.location;
                const descriptionText = j.job_data ? j.job_data.descriptionText : j.descriptionText;

                // Use an encoded ID instead of passing the entire payload inside an attribute
                const descId = "desc_" + Math.random().toString(36).substr(2, 9);
                // We will store the data in a global window object to avoid escaping issues
                window[`modalData_${descId}`] = {
                    desc: descriptionText || '',
                    reason: j.reasoning || j.fit_reasoning || ''
                };

                const rawDate = j.first_seen || j.date_seen || '';
                const dayDate = rawDate ? rawDate.split('T')[0] : '';
                const keywordVal = j.keyword || '';
                const categoryVal = j.category || '';

                let scoreType = 'non-valutato';
                if (j.fit_score !== null && typeof j.fit_score !== 'undefined') {
                    scoreType = j.fit_score >= 75 ? 'positivo' : 'negativo';
                }

                let likedType = '';
                if (j.liked === true) likedType = 'liked';
                if (j.liked === false) likedType = 'disliked';

                return `
            <tr class="job-row" data-date="${dayDate}" data-keyword="${escapeHtml(keywordVal)}" data-category="${escapeHtml(categoryVal)}" data-score="${scoreType}" data-liked="${likedType}">
                <td>
                    <a href="javascript:void(0)" class="btn-desc" data-target="${descId}" style="text-decoration: none; border-bottom: 1px dashed var(--accent); color: var(--accent); font-weight: bold;" title="Mostra descrizione">
                        ${escapeHtml(title)}
                    </a>
                </td>
                <td>${escapeHtml(company)}</td>
                <td>${escapeHtml(location)}</td>
                <td class="metric" style="text-align: center;">
                    <a href="javascript:void(0)" class="score-link" data-target="${descId}" style="text-decoration: none; border-bottom: 1px dashed var(--accent); color: inherit;" title="Mostra ragioni">
                        ${scoreHtml}
                    </a>
                </td>
                <td>${escapeHtml(j.category)}</td>
                <td style="color: var(--text-muted);">${formatDate(rawDate)}</td>
                <td><a href="${url}" target="_blank">Apri &nearr;</a></td>
                <td style="text-align: center;">
                    <div style="display: flex; gap: 5px; justify-content: center;">
                        <button class="btn-like" data-docid="${j._doc_id || ''}" data-like="true" data-current="${j.liked === true ? 'true' : 'false'}" style="background-color: ${j.liked === true ? '#2e7d32' : 'transparent'}; color: ${j.liked === true ? '#fff' : 'var(--text-muted)'}; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: all 0.2s;" title="Like">👍</button>
                        <button class="btn-like" data-docid="${j._doc_id || ''}" data-like="false" data-current="${j.liked === false ? 'true' : 'false'}" style="background-color: ${j.liked === false ? '#c62828' : 'transparent'}; color: ${j.liked === false ? '#fff' : 'var(--text-muted)'}; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: all 0.2s;" title="Dislike">👎</button>
                    </div>
                </td>
                <td>
                    <button class="btn-applied" data-docid="${j._doc_id || ''}" data-applied="${j.applied === true ? 'true' : 'false'}" style="background-color: ${j.applied === true ? '#2e7d32' : '#555'}; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer;">
                        ${j.applied === true ? 'Applicato ✓' : 'Non applicato'}
                    </button>
                </td>
            </tr>
        `;
            }).join('');

            return `
        <h2>Tutte le Offerte Salvate</h2>
        <div class="card" style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap;">
            <div>
                <label style="display:block; margin-bottom: 5px; font-size: 0.9em; color: var(--text-muted);">Data</label>
                <select id="filter-date" style="padding: 6px; border-radius: 4px; background: #2c2c2c; color: #fff; border: 1px solid var(--border); min-width: 150px;">
                    <option value="">Tutte</option>
                    ${dateOptions}
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom: 5px; font-size: 0.9em; color: var(--text-muted);">Query (Keyword)</label>
                <select id="filter-keyword" style="padding: 6px; border-radius: 4px; background: #2c2c2c; color: #fff; border: 1px solid var(--border); min-width: 150px;">
                    <option value="">Tutte</option>
                    ${keywordOptions}
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom: 5px; font-size: 0.9em; color: var(--text-muted);">Categoria</label>
                <select id="filter-category" style="padding: 6px; border-radius: 4px; background: #2c2c2c; color: #fff; border: 1px solid var(--border); min-width: 150px;">
                    <option value="">Tutte</option>
                    ${categoryOptions}
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom: 5px; font-size: 0.9em; color: var(--text-muted);">Fit Score</label>
                <select id="filter-score" style="padding: 6px; border-radius: 4px; background: #2c2c2c; color: #fff; border: 1px solid var(--border); min-width: 150px;">
                    <option value="">Tutti</option>
                    <option value="positivo">Solo Positivi (>= 75)</option>
                    <option value="negativo">Solo Negativi (< 75)</option>
                    <option value="non-valutato">Non Valutati</option>
                </select>
            </div>
            <div>
                <label style="display:block; margin-bottom: 5px; font-size: 0.9em; color: var(--text-muted);">Preferenza</label>
                <select id="filter-liked" style="padding: 6px; border-radius: 4px; background: #2c2c2c; color: #fff; border: 1px solid var(--border); min-width: 150px;">
                    <option value="">Tutte</option>
                    <option value="liked">Solo Piaciute (👍)</option>
                    <option value="disliked">Solo Scartate (👎)</option>
                </select>
            </div>
            <div style="margin-left: auto; align-self: flex-end; padding-bottom: 5px;">
                <span id="jobs-counter" class="metric" style="font-size: 1.1em;">${urls.length}</span> <span style="color: var(--text-muted); font-size: 0.9em;">offerte visibili</span>
            </div>
        </div>
        <div class="card table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Titolo</th>
                        <th>Azienda</th>
                        <th>Luogo</th>
                        <th style="text-align: center;">Score</th>
                        <th>Categoria</th>
                        <th>Date Seen</th>
                        <th>Link</th>
                        <th style="text-align: center;">Preferenza</th>
                        <th>Candidatura</th>
                    </tr>
                </thead>
                <tbody id="job-table-body">
                    ${rows}
                </tbody>
            </table>
        </div>
    `;
        }

        function renderModal() {
            return `
        <!-- Info Modal -->
        <div class="modal-overlay" id="info-modal">
            <div class="modal-container">
                <div class="modal-header">
                    <h3 style="margin: 0; color: var(--accent);">Dettagli Offerta</h3>
                    <button class="modal-close" id="btn-close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <h4 style="margin-bottom: 10px;">Fit Reasoning</h4>
                    <div class="reasoning-box" id="modal-reasoning"></div>
                    
                    <h4 style="margin-bottom: 10px;">Description text</h4>
                    <div class="desc-box" id="modal-description"></div>
                </div>
            </div>
        </div>

        <!-- Score Modal -->
        <div class="modal-overlay" id="score-modal">
            <div class="modal-container" style="max-width: 600px;">
                <div class="modal-header">
                    <h3 style="margin: 0; color: var(--accent);">Fit Score Reasoning</h3>
                    <button class="modal-close" id="btn-close-score-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="reasoning-box">
                        <ul id="score-reasoning-list" style="margin: 0; padding-left: 20px;"></ul>
                    </div>
                </div>
            </div>
        </div>
    `;
        }

        // ==========================================
        // EVENTS
        // ==========================================
        function attachEvents() {
            // Add event listeners for filters
            const filterDate = document.getElementById('filter-date');
            const filterKeyword = document.getElementById('filter-keyword');
            const filterCategory = document.getElementById('filter-category');
            const filterScore = document.getElementById('filter-score');
            const filterLiked = document.getElementById('filter-liked');

            const applyFilters = () => {
                let visibleCount = 0;
                const selDate = filterDate ? filterDate.value : '';
                const selKeyword = filterKeyword ? filterKeyword.value : '';
                const selCategory = filterCategory ? filterCategory.value : '';
                const selScore = filterScore ? filterScore.value : '';
                const selLiked = filterLiked ? filterLiked.value : '';

                document.querySelectorAll('.job-row').forEach(row => {
                    const rowDate = row.getAttribute('data-date');
                    const rowKeyword = row.getAttribute('data-keyword');
                    const rowCategory = row.getAttribute('data-category');
                    const rowScore = row.getAttribute('data-score');
                    const rowLiked = row.getAttribute('data-liked');

                    let show = true;
                    if (selDate && rowDate !== selDate) show = false;
                    if (selKeyword && rowKeyword !== selKeyword) show = false;
                    if (selCategory && rowCategory !== selCategory) show = false;
                    if (selScore && rowScore !== selScore) show = false;
                    if (selLiked && rowLiked !== selLiked) show = false;

                    row.style.display = show ? '' : 'none';
                    if (show) visibleCount++;
                });

                const counterEl = document.getElementById('jobs-counter');
                if (counterEl) {
                    counterEl.textContent = visibleCount;
                }
            };

            if (filterDate) filterDate.addEventListener('change', applyFilters);
            if (filterKeyword) filterKeyword.addEventListener('change', applyFilters);
            if (filterCategory) filterCategory.addEventListener('change', applyFilters);
            if (filterScore) filterScore.addEventListener('change', applyFilters);
            if (filterLiked) filterLiked.addEventListener('change', applyFilters);




            // Sincronizza lo slider delle keyword
            const barLabels = document.querySelectorAll('.bar-label');
            if (barLabels.length > 0) {
                const resizeObserver = new ResizeObserver(entries => {
                    for (let entry of entries) {
                        if (entry.target.style.width && entry.target.style.width !== keywordLabelWidth) {
                            keywordLabelWidth = entry.target.style.width;
                            barLabels.forEach(label => {
                                if (label !== entry.target) {
                                    label.style.width = keywordLabelWidth;
                                }
                            });
                        }
                    }
                });
                barLabels.forEach(label => resizeObserver.observe(label));
            }

            // Categories Accordion
            document.querySelectorAll('.category-item').forEach(item => {
                const header = item.querySelector('.category-header');
                if (header) {
                    header.addEventListener('click', () => {
                        const idx = item.getAttribute('data-index');
                        const body = document.getElementById(`cat-body-${idx}`);
                        if (body) body.classList.toggle('expanded');
                    });
                }
            });

            // Applied toggle logic
            document.querySelectorAll(".btn-like").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const docId = btn.getAttribute("data-docid");
                    if (!docId) return;

                    const isLikeBtn = btn.getAttribute("data-like") === "true";
                    const isCurrentlyActive = btn.getAttribute("data-current") === "true";

                    // if clicking an active button, we unset it (null). otherwise we set it to isLikeBtn (true/false)
                    const newLikedState = isCurrentlyActive ? null : isLikeBtn;

                    // Update UI optimistically
                    const row = btn.closest('tr');
                    if (row) {
                        const likeBtn = row.querySelector('.btn-like[data-like="true"]');
                        const dislikeBtn = row.querySelector('.btn-like[data-like="false"]');

                        if (newLikedState === true) {
                            likeBtn.setAttribute("data-current", "true");
                            likeBtn.style.backgroundColor = "#2e7d32";
                            likeBtn.style.color = "#fff";

                            dislikeBtn.setAttribute("data-current", "false");
                            dislikeBtn.style.backgroundColor = "transparent";
                            dislikeBtn.style.color = "var(--text-muted)";

                            row.setAttribute("data-liked", "liked");
                        } else if (newLikedState === false) {
                            likeBtn.setAttribute("data-current", "false");
                            likeBtn.style.backgroundColor = "transparent";
                            likeBtn.style.color = "var(--text-muted)";

                            dislikeBtn.setAttribute("data-current", "true");
                            dislikeBtn.style.backgroundColor = "#c62828";
                            dislikeBtn.style.color = "#fff";

                            row.setAttribute("data-liked", "disliked");
                        } else {
                            likeBtn.setAttribute("data-current", "false");
                            likeBtn.style.backgroundColor = "transparent";
                            likeBtn.style.color = "var(--text-muted)";

                            dislikeBtn.setAttribute("data-current", "false");
                            dislikeBtn.style.backgroundColor = "transparent";
                            dislikeBtn.style.color = "var(--text-muted)";

                            row.setAttribute("data-liked", "");
                        }
                    }

                    try {
                        const docRef = window.doc(window.db, "jobs", docId);
                        await window.updateDoc(docRef, { liked: newLikedState });

                        const url = Object.keys(appData.job_store).find(k => appData.job_store[k]._doc_id === docId);
                        if (url) {
                            appData.job_store[url].liked = newLikedState;
                        }
                    } catch (error) {
                        console.error("Error updating document:", error);
                    }
                });
            });

            document.querySelectorAll(".btn-applied").forEach(btn => {
                btn.addEventListener("click", async (e) => {
                    const docId = btn.getAttribute("data-docid");
                    if (!docId) return;

                    const isCurrentlyApplied = btn.getAttribute("data-applied") === "true";
                    const newAppliedState = !isCurrentlyApplied;

                    btn.setAttribute("data-applied", newAppliedState.toString());
                    btn.style.backgroundColor = newAppliedState ? "#2e7d32" : "#555";
                    btn.textContent = newAppliedState ? "Applicato ✓" : "Non applicato";

                    try {
                        const docRef = window.doc(window.db, "jobs", docId);
                        await window.updateDoc(docRef, { applied: newAppliedState });

                        const url = Object.keys(appData.job_store).find(k => appData.job_store[k]._doc_id === docId);
                        if (url) {
                            appData.job_store[url].applied = newAppliedState;
                        }
                    } catch (error) {
                        console.error("Error updating document:", error);
                        btn.setAttribute("data-applied", isCurrentlyApplied.toString());
                        btn.style.backgroundColor = isCurrentlyApplied ? "#2e7d32" : "#555";
                        btn.textContent = "Errore!";
                        setTimeout(() => {
                            btn.textContent = isCurrentlyApplied ? "Applicato ✓" : "Non applicato";
                        }, 2000);
                    }
                });
            });

            // Modal logic
            const modal = document.getElementById('info-modal');
            const modalReason = document.getElementById('modal-reasoning');
            const modalDesc = document.getElementById('modal-description');
            const closeBtn = document.getElementById('btn-close-modal');

            // Score click logic
            document.querySelectorAll('.score-link').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.currentTarget.getAttribute('data-target');
                    const data = window[`modalData_${targetId}`];
                    const reasonText = data.reason || 'Nessuna informazione disponibile.';

                    // Split reasoning into sentences for bullet points
                    const sentences = reasonText.split(/(?<=[.!?])\s+/).filter(s => s.trim().length > 0);
                    const listHtml = sentences.map(s => `<li>${s}</li>`).join('');

                    const scoreList = document.getElementById('score-reasoning-list');
                    if (scoreList) scoreList.innerHTML = listHtml;

                    const scoreModal = document.getElementById('score-modal');
                    if (scoreModal) scoreModal.classList.add('active');
                });
            });

            const scoreModal = document.getElementById('score-modal');
            const closeScoreBtn = document.getElementById('btn-close-score-modal');
            if (closeScoreBtn && scoreModal) {
                closeScoreBtn.addEventListener('click', () => scoreModal.classList.remove('active'));
                scoreModal.addEventListener('click', (e) => {
                    if (e.target === scoreModal) scoreModal.classList.remove('active');
                });
            }

            document.querySelectorAll('.btn-desc').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const targetId = e.target.getAttribute('data-target');
                    const data = window[`modalData_${targetId}`];

                    if (modalReason) modalReason.innerText = data.reason || 'Nessun ragionamento disponibile.';
                    if (modalDesc) modalDesc.innerText = data.desc || 'Nessuna descrizione disponibile.';

                    if (modal) modal.classList.add('active');
                });
            });

            if (closeBtn && modal) {
                closeBtn.addEventListener('click', () => {
                    modal.classList.remove('active');
                });
            }

            if (modal) {
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        modal.classList.remove('active');
                    }
                });
            }
        }

        // ==========================================
        // BOOTSTRAP
        // ==========================================
        render();

    </script>
</body>

</html>
